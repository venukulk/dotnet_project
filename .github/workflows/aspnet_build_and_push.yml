name: aspnetapp Scan Docker Images
on:
  push:
    branches: [ main ]
    paths:
      - 'src/aspnetapp/**'
  pull_request:
    branches: [ main ]

permissions:
  id-token: write
  security-events: write
  contents: read
  actions: read    
jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          registry: docker.io
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: src/aspnetapp/Dockerfile
          tags: venukulk/aspnetapp:${{ github.sha }}
          sbom: ${{ github.event_name != 'pull_request' }}
          provenance: ${{ github.event_name != 'pull_request' }}
          push: true  # Push the image to enable attestations
    
      - name: Run Docker Scout Vulnerability Scan
        uses: docker/scout-action@v1
        with:
          command: cves,quickview
          image: venukulk/aspnetapp:${{ github.sha }}
          sarif-file: scout-report.sarif
          platform: linux/amd64          

      - name: Upload Scan Results to GitHub Security Tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: scout-report.sarif