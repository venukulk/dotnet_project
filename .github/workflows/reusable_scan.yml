name: Reusable Docker Build and Scan

on:
  workflow_call:
    inputs:
      context:
        description: 'Docker build context path'
        required: false
        default: '.'
        type: string
      dockerfile_path:
        description: 'Path to the Dockerfile'
        required: true
        type: string
      image_name:
        description: 'Target image name (e.g., venukulk/aspnetapp1)'
        required: true
        type: string
    secrets:
      DOCKER_USERNAME:
        description: 'Docker Hub Username'
        required: true
      DOCKER_PASSWORD:
        description: 'Docker Hub Password'
        required: true

permissions:
  id-token: write
  security-events: write
  contents: read
  actions: read    

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          registry: docker.io
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile_path }}
          tags: ${{ inputs.image_name }}:${{ github.sha }}
          sbom: ${{ github.event_name != 'pull_request' }}
          provenance: ${{ github.event_name != 'pull_request' }}
          push: true
    
      - name: Run Docker Scout Vulnerability Scan
        uses: docker/scout-action@v1
        with:
          command: cves,quickview
          image: ${{ inputs.image_name }}:${{ github.sha }}
          sarif-file: scout-report.sarif
          platform: linux/amd64          

      - name: Upload Scan Results to GitHub Security Tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: scout-report.sarif
